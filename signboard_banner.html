<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>تصميم يافطة حواوشي النصر 2م × 2م</title>
  
  <!-- FontAwesome for Premium Icons -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  
  <!-- Google Fonts - Cairo -->
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;800;900&display=swap">
  
  <style>
    /* Top-level @page rule to force 1:1 aspect ratio layout on print */
    @page {
      size: landscape;
      margin: 0;
    }

    :root {
      --primary-color: #9b1c1c;      /* Deep Maroon Red */
      --secondary-color: #d4af37;    /* Warm Gold */
      --dark-color: #1a0f0d;         /* Spicy Charcoal */
      --light-color: #fdfaf6;        /* Ivory Cream Background */
      --white: #ffffff;
      --gray-100: #f7f1e5;
      --gray-200: #eadfc9;
      --gray-300: #d8c9ae;
      --gray-600: #7d6b58;
      --font-family-arabic: 'Cairo', sans-serif;
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
      font-family: var(--font-family-arabic);
    }

    body {
      direction: rtl;
      text-align: right;
      background-color: #1a1a1a;
      color: var(--dark-color);
      display: flex;
      flex-direction: column;
      align-items: center;
      min-height: 100vh;
      padding-bottom: 2rem;
    }

    /* Print Controls bar (Hidden during print) */
    .no-print-bar {
      width: 100%;
      background: var(--dark-color);
      border-bottom: 3px solid var(--secondary-color);
      padding: 0.8rem 2rem;
      display: flex;
      justify-content: space-between;
      align-items: center;
      box-shadow: 0 4px 15px rgba(0, 0, 0, 0.4);
      z-index: 100;
      margin-bottom: 2rem;
    }

    .no-print-bar h1 {
      color: var(--white);
      font-size: 1.2rem;
      font-weight: 800;
    }
    
    .no-print-bar h1 span {
      color: var(--secondary-color);
    }

    .control-buttons {
      display: flex;
      gap: 1rem;
    }

    .btn {
      padding: 0.5rem 1.2rem;
      border-radius: 8px;
      font-weight: 700;
      font-size: 0.9rem;
      cursor: pointer;
      display: inline-flex;
      align-items: center;
      gap: 0.5rem;
      text-decoration: none;
      transition: all 0.2s ease;
      border: 1.5px solid transparent;
    }

    .btn-primary {
      background: var(--primary-color);
      color: var(--white);
    }

    .btn-primary:hover {
      background: #7f1212;
      transform: translateY(-1px);
    }

    /* Print Page Container (1:1 Square) - Screen Mode */
    .signboard-page {
      width: 200mm;
      height: 200mm; /* Exactly 1:1 ratio for square signboard */
      background: var(--light-color);
      border: 15px double var(--secondary-color);
      outline: 5px solid var(--primary-color);
      outline-offset: -20px;
      padding: 8mm;
      box-shadow: 0 10px 30px rgba(0,0,0,0.5);
      position: relative;
      overflow: hidden;
      display: flex;
      flex-direction: column;
      background-image: 
        radial-gradient(rgba(212, 175, 55, 0.04) 1.5px, transparent 0),
        radial-gradient(rgba(155, 28, 28, 0.03) 1.5px, transparent 0);
      background-size: 24px 24px;
      background-position: 0 0, 12px 12px;
    }

    /* Grid Layout */
    .menu-grid {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      grid-template-rows: repeat(4, 1fr);
      gap: 3.5mm;
      width: 100%;
      height: 100%;
    }

    /* Brand/Identity Card (Center 2x2: spans columns 2-3, and rows 2-3) */
    .brand-card {
      grid-column: 2 / 4;
      grid-row: 2 / 4;
      background: var(--primary-color);
      color: var(--white);
      border: 3.5px solid var(--secondary-color);
      border-radius: 16px;
      padding: 4mm;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      box-shadow: 0 6px 15px rgba(0,0,0,0.25);
      position: relative;
      overflow: hidden;
      z-index: 10;
    }

    .brand-card::before {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background-image: url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" width="60" height="60" viewBox="0 0 100 100"><polygon points="50,15 90,85 10,85" fill="none" stroke="rgba(212,175,55,0.06)" stroke-width="1.5"/></svg>');
      background-size: 50px 50px;
      opacity: 0.45;
      pointer-events: none;
    }

    .brand-logo {
      width: 75px;
      height: 75px;
      border-radius: 50%;
      border: 3px solid var(--secondary-color);
      margin-bottom: 2mm;
      object-fit: cover;
      background: var(--white);
      z-index: 2;
    }

    .brand-name {
      font-size: 2.1rem;
      font-weight: 900;
      color: var(--secondary-color);
      line-height: 1.1;
      margin-bottom: 0.5mm;
      z-index: 2;
    }

    .brand-slogan {
      font-size: 0.85rem;
      color: var(--white);
      font-weight: 600;
      margin-bottom: 3.5mm;
      z-index: 2;
    }

    .contact-box {
      width: 100%;
      background: rgba(255, 255, 255, 0.12);
      border: 1px solid rgba(212, 175, 55, 0.45);
      border-radius: 10px;
      padding: 2mm 3mm;
      display: flex;
      flex-direction: column;
      gap: 1.5mm;
      z-index: 2;
    }

    .contact-item {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 2mm;
      font-size: 0.9rem;
      font-weight: 800;
    }

    .contact-item i {
      color: var(--secondary-color);
      font-size: 1.05rem;
    }

    .contact-item span {
      direction: ltr;
    }

    .delivery-badge {
      margin-top: 3.5mm;
      background: var(--secondary-color);
      color: var(--dark-color);
      font-size: 0.8rem;
      font-weight: 900;
      padding: 1.5mm 4mm;
      border-radius: 50px;
      z-index: 2;
      box-shadow: 0 3px 6px rgba(0,0,0,0.15);
    }

    /* Product Card */
    .product-card {
      background: var(--white);
      border: 1.5px solid var(--gray-200);
      border-radius: 12px;
      overflow: hidden;
      display: flex;
      flex-direction: column;
      height: 100%;
      width: 100%;
      box-shadow: 0 3px 8px rgba(0,0,0,0.05);
      position: relative;
    }

    .product-image {
      position: relative;
      width: 100%;
      height: 70%;
      overflow: hidden;
      border-bottom: 1.5px solid var(--gray-100);
    }

    .product-image img {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      object-fit: cover;
      object-position: center;
      display: block;
    }

    .product-category-badge {
      position: absolute;
      top: 6px;
      right: 6px;
      background: rgba(155, 28, 28, 0.85);
      backdrop-filter: blur(2px);
      color: var(--white);
      font-size: 0.6rem;
      font-weight: 800;
      padding: 0.5mm 2mm;
      border-radius: 4px;
      border: 1px solid rgba(212, 175, 55, 0.4);
      z-index: 5;
    }

    .product-info {
      padding: 2mm 3mm;
      display: flex;
      align-items: center;
      justify-content: center;
      background: var(--white);
      width: 100%;
      height: 30%;
      overflow: hidden;
    }

    .product-name {
      font-size: 0.95rem;
      font-weight: 800;
      color: var(--dark-color);
      text-align: center;
      line-height: 1.3;
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }

    /* Promo/Decorative Card (Slot 12) */
    .promo-card {
      background: linear-gradient(135deg, var(--white) 0%, var(--gray-100) 100%);
      border: 1.5px solid var(--gray-200);
      border-radius: 12px;
      padding: 3mm;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      box-shadow: 0 3px 8px rgba(0,0,0,0.05);
      height: 100%;
      width: 100%;
    }

    .promo-card i {
      font-size: 2.2rem;
      color: var(--secondary-color);
      margin-bottom: 2mm;
    }

    .promo-card h2 {
      font-size: 1rem;
      font-weight: 900;
      color: var(--primary-color);
      margin-bottom: 1.5mm;
    }

    .promo-card p {
      font-size: 0.7rem;
      color: var(--gray-600);
      font-weight: 600;
      line-height: 1.3;
    }

    /* Print Specific Styles - Vector scaling using vmin to guarantee exact 1:1 square centered on any paper */
    @media print {
      .no-print-bar {
        display: none !important;
      }
      
      body {
        background: var(--white) !important;
        margin: 0 !important;
        padding: 0 !important;
        width: 100vw !important;
        height: 100vh !important;
        display: flex !important;
        align-items: center !important;
        justify-content: center !important;
        overflow: hidden !important;
        -webkit-print-color-adjust: exact !important;
        print-color-adjust: exact !important;
      }

      .signboard-page {
        box-shadow: none !important;
        margin: 0 !important;
        width: 94vmin !important;
        height: 94vmin !important; /* Force 1:1 aspect ratio dynamically based on screen minimum scale */
        position: relative !important;
        top: auto !important;
        left: auto !important;
        transform: none !important;
        box-sizing: border-box !important;
        display: flex !important;
        flex-direction: column !important;
        
        /* Scale layout spacing and borders relative to vmin */
        padding: 2.5vmin !important;
        border-width: 1.8vmin !important;
        outline-width: 0.6vmin !important;
        outline-offset: -2.8vmin !important;
      }

      .menu-grid {
        display: grid !important;
        grid-template-columns: repeat(4, 1fr) !important;
        grid-template-rows: repeat(4, 1fr) !important;
        gap: 1.2vmin !important;
        height: 100% !important;
        width: 100% !important;
      }

      /* Scale Brand Card (Center 2x2) */
      .brand-card {
        padding: 1.5vmin !important;
        border-radius: 1.5vmin !important;
        border-width: 0.25vmin !important;
      }

      .brand-logo {
        width: 8vmin !important;
        height: 8vmin !important;
        border-width: 0.3vmin !important;
        margin-bottom: 0.8vmin !important;
      }

      .brand-name {
        font-size: 3.2vmin !important;
        margin-bottom: 0.2vmin !important;
      }

      .brand-slogan {
        font-size: 1.3vmin !important;
        margin-bottom: 1.5vmin !important;
      }

      .contact-box {
        padding: 0.6vmin !important;
        gap: 0.4vmin !important;
        border-radius: 0.8vmin !important;
        border-width: 0.1vmin !important;
      }

      .contact-item {
        font-size: 1.45vmin !important;
        gap: 0.6vmin !important;
      }

      .contact-item i {
        font-size: 1.5vmin !important;
      }

      .delivery-badge {
        font-size: 1.2vmin !important;
        padding: 0.4vmin 1.2vmin !important;
        margin-top: 1.5vmin !important;
      }

      /* Scale Product Cards */
      .product-card {
        border-width: 0.15vmin !important;
        border-radius: 1.2vmin !important;
        display: flex !important;
        flex-direction: column !important;
        height: 100% !important;
        width: 100% !important;
      }

      .product-image {
        height: 70% !important;
        width: 100% !important;
        border-bottom-width: 0.15vmin !important;
      }

      .product-category-badge {
        font-size: 0.95vmin !important;
        padding: 0.2vmin 0.8vmin !important;
        top: 0.6vmin !important;
        right: 0.6vmin !important;
        border-width: 0.1vmin !important;
        border-radius: 0.4vmin !important;
      }

      .product-info {
        height: 30% !important;
        width: 100% !important;
        padding: 0.5vw 0.8vw !important;
      }

      .product-name {
        font-size: 1.65vmin !important;
      }

      /* Scale Promo Card */
      .promo-card {
        border-width: 0.15vmin !important;
        border-radius: 1.2vmin !important;
        padding: 1.2vmin !important;
      }
      
      .promo-card i {
        font-size: 4vmin !important;
        margin-bottom: 0.8vmin !important;
      }

      .promo-card h2 {
        font-size: 1.8vmin !important;
        margin-bottom: 0.5vmin !important;
      }

      .promo-card p {
        font-size: 1.2vmin !important;
      }
    }
  </style>
</head>
<body>

  <!-- Top Action Bar (Hidden in Print) -->
  <div class="no-print-bar">
    <h1>معاينة يافطة حواوشي النصر <span>(مقاس 2 متر × 2 متر بدون أسعار)</span></h1>
    <div class="control-buttons">
      <button onclick="window.print()" class="btn btn-primary">
        <i class="fa-solid fa-print"></i>
        <span>طباعة اليافطة الآن</span>
      </button>
    </div>
  </div>

  <!-- 1:1 Printable Signboard Container -->
  <div class="signboard-page" id="signboardPage">
    <div class="menu-grid" id="menuGrid">
      
      <!-- Brand Card (Center 2x2) -->
      <div class="brand-card">
        <img src="assets/logo.jpg" alt="حواوشي النصر" class="brand-logo" id="brandLogo">
        <h1 class="brand-name">حواوشي النصر</h1>
        <p class="brand-slogan">أصل الحواوشي البلدي والورقة</p>
        
        <div class="contact-box">
          <div class="contact-item">
            <i class="fa-solid fa-phone"></i>
            <span>01113980729</span>
          </div>
          <div class="contact-item">
            <i class="fa-solid fa-phone"></i>
            <span>0233355332</span>
          </div>
          <div class="contact-item" style="color: #c9ffcc;">
            <i class="fa-brands fa-whatsapp" style="color: #c9ffcc;"></i>
            <span>01026401035</span>
          </div>
        </div>

        <div class="delivery-badge">
          <i class="fa-solid fa-truck"></i> توصيل القاهرة والجيزة
        </div>
      </div>

      <!-- Dynamically filled cells (11 cells for products + 1 cell for promo) -->

    </div>
  </div>

  <!-- Supabase & Database Scripts -->
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="js/supabase-config.js?v=2"></script>
  <script src="js/database.js?v=2"></script>
  
  <script>
    const CATEGORIES_AR = {
      hawawshi: "حواوشي",
      plates: "وجبات وورقات"
    };

    function populateSignboardGrid() {
      const products = getProducts() || [];
      
      // Filter out unavailable items
      const activeProducts = products.filter(p => p.available !== false);
      
      const grid = document.getElementById('menuGrid');
      if (!grid) return;
      
      // Keep only the brand card
      const brandCard = grid.querySelector('.brand-card');
      grid.innerHTML = '';
      grid.appendChild(brandCard);
      
      // Add active products (up to 11 to fill the remaining 12 slots around center)
      const displayProducts = activeProducts.slice(0, 11);
      
      displayProducts.forEach(product => {
        const card = document.createElement('div');
        card.className = 'product-card';
        
        const categoryLabel = CATEGORIES_AR[product.category] || product.category;
        const imgUrl = product.image || 'assets/logo.jpg';
        
        card.innerHTML = `
          <div class="product-image">
            <img src="${imgUrl}" alt="${product.name}">
            <span class="product-category-badge">${categoryLabel}</span>
          </div>
          <div class="product-info">
            <h2 class="product-name">${product.name}</h2>
          </div>
        `;
        grid.appendChild(card);
      });

      // Append 12th card: Decorative Promo Card if grid has space
      const promoCard = document.createElement('div');
      promoCard.className = 'promo-card';
      promoCard.innerHTML = `
        <i class="fa-solid fa-award"></i>
        <h2>لحم بلدي طازج 100%</h2>
        <p>شعارنا الجودة والنظافة والطعم الأصلي المميز</p>
      `;
      grid.appendChild(promoCard);
    }

    document.addEventListener("DOMContentLoaded", () => {
      populateSignboardGrid();
      
      window.addEventListener("productsUpdated", () => {
        populateSignboardGrid();
      });

      // Error handler for brand logo
      const brandLogo = document.getElementById('brandLogo');
      if (brandLogo) {
        brandLogo.onerror = function() {
          brandLogo.src = 'assets/logo.jpg';
        };
      }
    });
  </script>
</body>
</html>
